# Stringly — nginx для статичного фронта (mock-демо), доверенный HTTPS (Let's Encrypt).
# Имя 144.31.235.244.nip.io (nip.io резолвится в этот IP, домен покупать не нужно).
# Порт 8443 (а не 443): на сервере 443 занят VPN-сервисом xray.
# Доступ: https://144.31.235.244.nip.io:8443
# Сертификат выпускается certbot (см. docs/run-and-deploy/05-server-setup.md).
# Куда положить на сервере: /etc/nginx/sites-available/stringly
# Активировать: ln -s /etc/nginx/sites-available/stringly /etc/nginx/sites-enabled/

# HTTP (80) → редирект на HTTPS-порт 8443 (Service Worker / MSW требует доверенный HTTPS).
server {
    listen 80;
    server_name 144.31.235.244.nip.io;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 8443 ssl;
    server_name 144.31.235.244.nip.io;

    ssl_certificate     /etc/letsencrypt/live/144.31.235.244.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/144.31.235.244.nip.io/privkey.pem;

    root /var/www/stringly;
    index index.html;

    # Сжатие
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    # Хэшированные ассеты (имена с хэшем) — кэшируем надолго.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker и точку входа НЕ кэшируем (иначе обновления не приедут).
    location = /mockServiceWorker.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA-fallback: любой неизвестный путь отдаёт index.html (react-router сам разрулит).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── НА БУДУЩЕЕ (когда появится Kotlin-бэк) ──────────────────────────────
    # Раскомментировать, пересобрать фронт с VITE_API_MODE=real и перезагрузить nginx.
